      <stop offset="0%" stop-color="#E8530A"/>
      <stop offset="100%" stop-color="#B83D08"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#grid)"/>
  <g transform="translate(150, 200)">
    <rect x="0" y="0" width="220" height="280" rx="12" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.30)" stroke-width="2"/>
    <rect x="20" y="30" width="180" height="20" rx="4" fill="rgba(255,255,255,0.20)"/>
    <rect x="20" y="70" width="140" height="14" rx="3" fill="rgba(255,255,255,0.15)"/>
    <rect x="20" y="110" width="160" height="14" rx="3" fill="rgba(255,255,255,0.15)"/>
    <circle cx="180" cy="240" r="22" fill="rgba(255,255,255,0.85)"/>
    <path d="M170 240 l8 8 l16 -16" stroke="#E8530A" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="600" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="200" font-weight="800" fill="rgba(255,255,255,0.18)" text-anchor="middle" dominant-baseline="middle" letter-spacing="20">KYC</text>
  <text x="600" y="600" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="500" fill="rgba(255,255,255,0.95)" text-anchor="middle" dominant-baseline="middle" letter-spacing="6">CASE STUDY · STARTUP FINTECH</text>
  <text x="600" y="650" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="rgba(255,255,255,0.65)" text-anchor="middle" dominant-baseline="middle" letter-spacing="3">8 SEMANAS · DE CAOS A PRODUCCIÓN</text>
  <g transform="translate(960, 50)">
