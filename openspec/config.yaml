# OpenSpec Configuration — GL Solutions Website
# Generated by sdd-init on 2026-06-23
# Updated 2026-06-24: corrected description (was Argentinian accounting per
# template default; actual business is Chilean Spec Driven Development
# consultancy for B2B SaaS/Fintech startups in Chile and LatAm).
# Also corrected Astro version (5.15 per CLAUDE.md, not 6.4.2).
# Removed bilingual ES/EN claim — site is Spanish (Chile) only.

context: |
  Adapting the RicoFast SaaS template (Astro 5.15 + Tailwind CSS v4) into a
  corporate website for GL Solutions SpA, a Chilean Spec Driven Development
  consultancy for B2B SaaS and Fintech startups in Chile and LatAm. This is
  a static-first, frontend-only project with no backend. The template
  provides marketing pages, MDX blog, dark mode, and a documented design
  system. The adaptation replaces demo content with GL Solutions branding,
  services, and Spanish (Chile) copy while preserving the foundation
  components (PageHeader, Button, Card, AccordionItem, etc.).

strict_tdd: false
  # No test runner detected in the template. Strict TDD is disabled until
  # test infrastructure is added. Verification relies on build checks
  # (astro check && astro build) and manual review.

testing:
  test_runner: none
  test_layers:
    unit: { available: false, tool: null }
    integration: { available: false, tool: null }
    e2e: { available: false, tool: null }
  coverage: false
  quality:
    linter:       { tool: biome,     command: "pnpm check" }
    type_checker: { tool: astro/ts,  command: "pnpm build (astro check)" }
    formatter:    { tool: biome,     command: "pnpm check" }

preflight:
  execution_mode: interactive
  artifact_store: both
  chained_pr: ask-always
  review_budget: 400

phases:
  proposal: { required: true, path: proposals/ }
  spec:     { required: true, path: specs/ }
  design:   { required: true, path: designs/ }
  tasks:    { required: true, path: tasks/ }
  apply:    { required: true, path: changes/ }
  verify:   { required: true }
  archive:  { required: true, path: archive/ }

language:
  primary: "es-CL"
  tone: "direct, technical, no generic SaaS marketing"
  avoid:
    - "Argentine voseo forms (escribinos, contanos, tenés, sos, querés)"
    - "Lunfardo or regional slang (guita, pibe, che, dale, re-, al toque)"
    - "Mexican-only forms (güey, chido, ándale, órale)"
    - "Spain-only forms (vosotros imperatives, vosotros possessives) — note: 'Escríbenos' is acceptable as the neutral/formal 2nd-person plural imperative that works for ES-CL readers"
    - "English jargon unless it's a technical term with no neutral equivalent (Feature Spec, DMD, ADR, BDD, mailto, hover, etc.)"
